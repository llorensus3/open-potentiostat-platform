<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfcff"/>
      <stop offset="100%" stop-color="#eef3ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#8aa0c2" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#4e6786"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill:#18324f; }
      .subtitle { font: 400 18px Arial, sans-serif; fill:#516b87; }
      .section { font: 700 22px Arial, sans-serif; fill:#1e3b59; }
      .label { font: 700 17px Arial, sans-serif; fill:#274563; }
      .text { font: 400 16px Arial, sans-serif; fill:#425d79; }
      .small { font: 400 14px Arial, sans-serif; fill:#617892; }
      .node { font: 700 15px Arial, sans-serif; fill:#25415d; }
    </style>
  </defs>

  <rect width="1500" height="980" fill="url(#bg)"/>

  <text x="60" y="64" class="title">Open Potentiostat Platform · Conceptual Electronic Diagram</text>
  <text x="60" y="96" class="subtitle">Research-oriented front-end inspired by classical potentiostat architecture: RE buffer, servo amplifier, TIA, DAC, ADC, and range switching</text>

  <!-- Main analog panel -->
  <g filter="url(#shadow)">
    <rect x="50" y="130" width="1400" height="760" rx="28" ry="28" fill="url(#panel)" stroke="#d9e4f2" stroke-width="2"/>
  </g>

  <!-- Left: digital/control -->
  <g filter="url(#shadow)">
    <rect x="90" y="190" width="260" height="180" rx="24" ry="24" fill="#ffffff" stroke="#cad8eb" stroke-width="2"/>
  </g>
  <text x="128" y="235" class="section">Digital Control</text>
  <text x="120" y="273" class="text">• Raspberry Pi / ESP32</text>
  <text x="120" y="305" class="text">• Experiment sequencing</text>
  <text x="120" y="337" class="text">• Timing and data logging</text>

  <g filter="url(#shadow)">
    <rect x="90" y="420" width="260" height="180" rx="24" ry="24" fill="#ffffff" stroke="#cad8eb" stroke-width="2"/>
  </g>
  <text x="160" y="465" class="section">DAC / ADC</text>
  <text x="120" y="503" class="text">• DAC → setpoint generation</text>
  <text x="120" y="535" class="text">• ADC → V<tspan baseline-shift="sub" font-size="12">RE</tspan>, V<tspan baseline-shift="sub" font-size="12">TIA</tspan></text>
  <text x="120" y="567" class="text">• Optional differential channel</text>

  <!-- Summer -->
  <g filter="url(#shadow)">
    <rect x="420" y="205" width="180" height="90" rx="18" ry="18" fill="#fffaf8" stroke="#f1d2c2" stroke-width="2"/>
  </g>
  <text x="475" y="243" class="label">Summer</text>
  <text x="448" y="270" class="small">DC + AC excitation</text>

  <!-- Servo -->
  <g filter="url(#shadow)">
    <rect x="680" y="185" width="250" height="130" rx="22" ry="22" fill="#fef8ff" stroke="#e4c8f0" stroke-width="2"/>
  </g>
  <text x="752" y="226" class="section">Servo Amplifier</text>
  <text x="716" y="260" class="text">Maintains E = V<tspan baseline-shift="sub" font-size="12">WE</tspan> − V<tspan baseline-shift="sub" font-size="12">RE</tspan></text>
  <text x="730" y="288" class="small">drives counter electrode (CE)</text>

  <!-- RE Buffer -->
  <g filter="url(#shadow)">
    <rect x="680" y="392" width="250" height="130" rx="22" ry="22" fill="#f7fbff" stroke="#c9dff2" stroke-width="2"/>
  </g>
  <text x="747" y="433" class="section">RE Buffer</text>
  <text x="718" y="467" class="text">High input impedance sensing</text>
  <text x="742" y="495" class="small">electrometer-style input stage</text>

  <!-- TIA -->
  <g filter="url(#shadow)">
    <rect x="680" y="595" width="250" height="170" rx="22" ry="22" fill="#f8fff9" stroke="#c6e8cf" stroke-width="2"/>
  </g>
  <text x="785" y="635" class="section">TIA</text>
  <text x="714" y="670" class="text">Current-to-voltage conversion</text>
  <text x="725" y="700" class="text">V<tspan baseline-shift="sub" font-size="12">out</tspan> = V<tspan baseline-shift="sub" font-size="12">ref</tspan> − I·R<tspan baseline-shift="sub" font-size="12">f</tspan></text>
  <text x="712" y="730" class="small">precision op-amp + compensation C<tspan baseline-shift="sub" font-size="12">f</tspan></text>

  <!-- Range switching -->
  <g filter="url(#shadow)">
    <rect x="1030" y="610" width="200" height="140" rx="22" ry="22" fill="#ffffff" stroke="#d8e2f0" stroke-width="2"/>
  </g>
  <text x="1063" y="648" class="section">Range Switching</text>
  <text x="1060" y="683" class="text">10 Ω · 100 Ω · 1 kΩ</text>
  <text x="1052" y="712" class="text">10 kΩ · 100 kΩ · 1 MΩ</text>

  <!-- Cell -->
  <g filter="url(#shadow)">
    <rect x="1100" y="240" width="260" height="240" rx="28" ry="28" fill="#ffffff" stroke="#d8dee8" stroke-width="2"/>
  </g>
  <text x="1140" y="285" class="section">Electrochemical Cell</text>
  <!-- electrodes inside -->
  <line x1="1168" y1="325" x2="1168" y2="430" stroke="#7a96b8" stroke-width="6"/>
  <line x1="1230" y1="325" x2="1230" y2="430" stroke="#7a96b8" stroke-width="4" stroke-dasharray="6 5"/>
  <line x1="1295" y1="325" x2="1295" y2="430" stroke="#7a96b8" stroke-width="6"/>
  <text x="1148" y="456" class="node">WE</text>
  <text x="1212" y="456" class="node">RE</text>
  <text x="1277" y="456" class="node">CE</text>
  <text x="1128" y="500" class="small">battery · sensor · corrosion · electrolyzer</text>

  <!-- Protection box -->
  <g filter="url(#shadow)">
    <rect x="1040" y="170" width="190" height="55" rx="18" ry="18" fill="#fffdf7" stroke="#ead9ab" stroke-width="2"/>
  </g>
  <text x="1076" y="205" class="label">Input Protection</text>

  <!-- Equations/notes -->
  <g filter="url(#shadow)">
    <rect x="1020" y="785" width="355" height="70" rx="20" ry="20" fill="#ffffff" stroke="#dae5f4" stroke-width="2"/>
  </g>
  <text x="1045" y="817" class="text">Measured channels: V<tspan baseline-shift="sub" font-size="12">RE</tspan>, V<tspan baseline-shift="sub" font-size="12">TIA</tspan>, optional V<tspan baseline-shift="sub" font-size="12">CELL</tspan></text>
  <text x="1045" y="842" class="small">Recommended topology: dedicated analog board + digital control board</text>

  <!-- Connections -->
  <line x1="350" y1="250" x2="420" y2="250" stroke="#4e6786" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="358" y="228" class="small">setpoint</text>

  <line x1="350" y1="510" x2="630" y2="510" stroke="#4e6786" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="420" y="490" class="small">measurement acquisition</text>

  <line x1="600" y1="250" x2="680" y2="250" stroke="#4e6786" stroke-width="4" marker-end="url(#arrow)"/>

  <line x1="930" y1="250" x2="1100" y2="250" stroke="#4e6786" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="958" y="228" class="small">drive CE</text>

  <line x1="1230" y1="325" x2="1230" y2="458" stroke="#4e6786" stroke-width="4"/>
  <line x1="1230" y1="458" x2="930" y2="458" stroke="#4e6786" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="980" y="438" class="small">sense RE</text>

  <line x1="1168" y1="325" x2="1168" y2="680" stroke="#4e6786" stroke-width="4"/>
  <line x1="1168" y1="680" x2="930" y2="680" stroke="#4e6786" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="972" y="660" class="small">measure I at WE</text>

  <line x1="930" y1="680" x2="1030" y2="680" stroke="#4e6786" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="944" y="710" class="small">select Rf</text>

  <line x1="1130" y1="610" x2="1130" y2="530" stroke="#4e6786" stroke-width="4" marker-end="url(#arrow)"/>

  <line x1="805" y1="522" x2="805" y2="595" stroke="#4e6786" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="820" y="564" class="small">ADC path</text>

  <line x1="805" y1="392" x2="805" y2="315" stroke="#4e6786" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="820" y="352" class="small">feedback</text>

  <!-- Bottom note -->
  <g filter="url(#shadow)">
    <rect x="80" y="900" width="1340" height="44" rx="18" ry="18" fill="#ffffff" stroke="#d7e3f3" stroke-width="2"/>
  </g>
  <text x="110" y="928" class="small">Conceptual diagram only · not a final validated schematic · intended for README, teaching, and architecture explanation</text>
</svg>
