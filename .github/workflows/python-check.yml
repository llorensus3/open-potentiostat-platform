name: Python checks

on:
  push:
  pull_request:

jobs:
  basic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install host dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f software/raspberry/requirements.txt ]; then pip install -r software/raspberry/requirements.txt; fi
      - name: Basic syntax check
        run: |
          python -m py_compile software/raspberry/example_run.py
